version: "4.1"
name: L406_coremark
type: ARM
deviceName: null
packDir: null
srcDirs: []
virtualFolder:
  name: <virtual_root>
  files: []
  folders:
    - name: Common
      files:
        - path: ../System/system_n32l40x.c
        - path: ../System/startup_n32l40x_gcc.s
      folders: []
    - name: User
      files:
        - path: ../Src/main.c
        - path: ../Src/dummy.c
        - path: ../Src/n32l40x_it.c
      folders: []
    - name: Coremark
      files:
        - path: ../coremark/core_list_join.c
        - path: ../coremark/core_main.c
        - path: ../coremark/core_matrix.c
        - path: ../coremark/core_portme.c
        - path: ../coremark/core_state.c
        - path: ../coremark/core_util.c
        - path: ../coremark/cvt.c
        - path: ../coremark/ee_printf.c
      folders: []
    - name: Firmware
      files:
        - path: ../n32l40x_std/src/n32l40x_exti.c
        - path: ../n32l40x_std/src/n32l40x_flash.c
        - path: ../n32l40x_std/src/n32l40x_gpio.c
        - path: ../n32l40x_std/src/n32l40x_rcc.c
        - path: ../n32l40x_std/src/n32l40x_usart.c
        - path: ../n32l40x_std/src/misc.c
      folders: []
dependenceList: []
outDir: .
miscInfo:
  uid: 36bcf0031e18a3008bbdaa10a96a7981
targets:
  Debug:
    cppPreprocessAttrs:
      defineList:
        - N32L406CB
        - __FPU_PRESENT
        - USE_STDPERIPH_DRIVER
      incList:
        - ../System/core
        - ../System
        - ../Inc
        - ../coremark
        - ../n32l40x_std/inc
      libList:
        - ../Src
    excludeList: []
    settings:
      debugger: cortex-debug
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M4
        floatingPointHardware: single
        options:
          version: 5
          afterBuildTasks:
            - name: make disasm
              abortAfterFailed: false
              command: arm-none-eabi-objdump -S ${OutDir}\${ProjectName}.elf > ${OutDir}\${ProjectName}.lst
              disable: false
          asm-compiler: {}
          beforeBuildTasks: []
          c/cpp-compiler:
            language-c: c23
            language-cpp: c++23
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-size-Oz
            optimization-lto: true
            warnings: all-warnings
          global:
            $float-abi-type: hard
            arm-thumb-mode: thumb
            not-use-syscalls: true
            output-debug-info: disable
            use-newlib-nano: true
          linker:
            $toolName: auto
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: ../System/n32l40x_flash.ld
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: N32L406CB
          vendor: Nations
        otherCmds: ""
        proType: 1
        speed: 2000
      OpenOCD:
        baseAddr: "0x08000000"
        bin: ""
        interface: cmsis-dap
        target: n32l406cb
      pyOCD:
        baseAddr: "0x08000000"
        bin: ""
        config: .eide/debug.pyocd.yaml
        otherCmds: '"--pack=..\System\NSING.N32L40x_DFP.1.0.2.pack"'
        speed: 1M
        targetName: n32l406cb
    uploader: pyOCD
