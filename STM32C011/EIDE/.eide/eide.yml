version: "4.1"
name: C011_CoreMark
type: ARM
deviceName: STM32C011x6
packDir: null
srcDirs: []
virtualFolder:
  name: <virtual_root>
  files: []
  folders:
    - name: System
      files:
        - path: ../System/system_stm32c0xx.c
        - path: ../System/startup_stm32c011xx_gcc.s
      folders: []
    - name: User
      files:
        - path: ../Src/main.c
        - path: ../Src/stm32c0xx_it.c
        - path: ../Src/dummy.c
      folders: []
    - name: Coremark
      files:
        - path: ../coremark/core_list_join.c
        - path: ../coremark/core_main.c
        - path: ../coremark/core_matrix.c
        - path: ../coremark/core_portme.c
        - path: ../coremark/core_state.c
        - path: ../coremark/core_util.c
        - path: ../coremark/cvt.c
        - path: ../coremark/ee_printf.c
      folders: []
dependenceList: []
outDir: .
miscInfo:
  uid: 36bcf0031e18a3008bbdaa90a96a7991
targets:
  Debug:
    cppPreprocessAttrs:
      defineList:
        - STM32C011xx
      incList:
        - ../Inc
        - ../System/Core
        - ../System
        - ../coremark
      libList: []
    excludeList: []
    settings:
      debugger: cortex-debug
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M0+
        floatingPointHardware: none
        options:
          version: 5
          afterBuildTasks:
            - name: make disasm
              abortAfterFailed: false
              command: arm-none-eabi-objdump -S ${OutDir}\${ProjectName}.elf > ${OutDir}\${ProjectName}.lst
              disable: false
          asm-compiler: {}
          beforeBuildTasks: []
          c/cpp-compiler:
            C_FLAGS: -funroll-all-loops -finline-limit=600 -ftree-dominator-opts -fno-if-conversion2 -fselective-scheduling -fno-code-hoisting
            language-c: c17
            language-cpp: c++17
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-fast
            warnings: all-warnings
          global:
            $float-abi-type: softfp
            arm-thumb-mode: thumb
            not-use-syscalls: true
            output-debug-info: disable
            use-newlib-nano: true
          linker:
            $toolName: auto
            LD_FLAGS: -Wl,--no-warn-rwx-segments
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: ../System/STM32C011x6.ld
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: STM32C011F6
          vendor: ST
        otherCmds: ""
        proType: 1
        speed: 2000
      OpenOCD:
        baseAddr: "0x08000000"
        bin: ""
        interface: cmsis-dap
        target: stm32c011x6
      pyOCD:
        baseAddr: "0x08000000"
        bin: ""
        config: .eide/debug.pyocd.yaml
        otherCmds: '"--pack=Keil.STM32C0xx_DFP.2.1.1.pack"'
        speed: 4M
        targetName: stm32c011f6px
    uploader: JLink
  Release:
    cppPreprocessAttrs:
      defineList:
        - STM32C011xx
      incList:
        - ../Inc
        - ../System/core
        - ../System
        - ../coremark
      libList:
        - ../Src
    excludeList: []
    settings:
      debugger: cortex-debug
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M0+
        floatingPointHardware: none
        options:
          version: 5
          afterBuildTasks:
            - name: make disasm
              abortAfterFailed: false
              command: arm-none-eabi-objdump -S ${OutDir}\${ProjectName}.elf > ${OutDir}\${ProjectName}.lst
              disable: false
          asm-compiler: {}
          beforeBuildTasks: []
          c/cpp-compiler:
            language-c: c17
            language-cpp: c++17
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-size
            warnings: all-warnings
          global:
            $float-abi-type: softfp
            arm-thumb-mode: thumb
            not-use-syscalls: true
            output-debug-info: disable
            use-newlib-nano: true
          linker:
            $toolName: auto
            LD_FLAGS: -Wl,--no-warn-rwx-segments
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: ../System/STM32C011x6.ld
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: STM32C011F6
          vendor: ST
        otherCmds: ""
        proType: 1
        speed: 1000
      OpenOCD:
        baseAddr: "0x08000000"
        bin: ""
        interface: cmsis-dap
        target: stm32c011x6
      pyOCD:
        baseAddr: "0x08000000"
        bin: ""
        config: .eide/release.pyocd.yaml
        otherCmds: '"--pack=Keil.STM32C0xx_DFP.2.1.1.pack"'
        speed: 4M
        targetName: STM32C011F6px
    uploader: JLink
